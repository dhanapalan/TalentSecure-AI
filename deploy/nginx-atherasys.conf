# =============================================================================
# Host-level Nginx config for gradlogic.atherasys.com
# Place at: /etc/nginx/sites-available/gradlogic
# Enable:   sudo ln -s /etc/nginx/sites-available/gradlogic /etc/nginx/sites-enabled/
# SSL:      sudo certbot --nginx \
#             -d gradlogic.atherasys.com \
#             -d admin.gradlogic.atherasys.com \
#             -d campus.gradlogic.atherasys.com \
#             -d exam.gradlogic.atherasys.com \
#             -d api.gradlogic.atherasys.com
# =============================================================================

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name gradlogic.atherasys.com admin.gradlogic.atherasys.com campus.gradlogic.atherasys.com exam.gradlogic.atherasys.com api.gradlogic.atherasys.com;
    return 301 https://$host$request_uri;
}

# ── Frontend portals (served by Vercel — just redirect) ──────────────────────
# NOTE: If using Vercel for frontend, remove this block and point DNS to Vercel.
# If self-hosting frontend on this VPS, keep this block.
server {
    listen 443 ssl;
    server_name gradlogic.atherasys.com admin.gradlogic.atherasys.com campus.gradlogic.atherasys.com exam.gradlogic.atherasys.com;

    ssl_certificate     /etc/letsencrypt/live/gradlogic.atherasys.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gradlogic.atherasys.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    location /socket.io/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }
}

# ── API subdomain ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.gradlogic.atherasys.com;

    ssl_certificate     /etc/letsencrypt/live/gradlogic.atherasys.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gradlogic.atherasys.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 20m;

    location / {
        proxy_pass         http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }

    location /socket.io/ {
        proxy_pass         http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }
}
