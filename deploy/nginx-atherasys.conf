# =============================================================================
# Host-level Nginx config for gradlogic.atherasys.com
#
# THIS FILE IS THE SOURCE OF TRUTH. Deploy FROM it; do not hand-edit the copy on
# the server. On 2026-07 the live config had drifted to a hand-written, api-only
# version missing the /socket.io/ upgrade block below, which broke all WebSocket
# (Socket.IO) connections until it was re-added by hand. Keep server and repo in
# sync:  sudo cp deploy/nginx-atherasys.conf /etc/nginx/sites-available/gradlogic
#        sudo nginx -t && sudo systemctl reload nginx
#
# Current production (frontend on Vercel): only the api.gradlogic.atherasys.com
# server block is actually used. The frontend portal block below applies only if
# the SPA is self-hosted on this VPS (:3000); with Vercel it can be omitted, and
# the live file /etc/nginx/sites-enabled/gradlogic.atherasys.com contains just the
# api vhost.
#
# Place at: /etc/nginx/sites-available/gradlogic
# Enable:   sudo ln -s /etc/nginx/sites-available/gradlogic /etc/nginx/sites-enabled/
# SSL:      sudo certbot --nginx \
#             -d gradlogic.atherasys.com \
#             -d admin.gradlogic.atherasys.com \
#             -d campus.gradlogic.atherasys.com \
#             -d exam.gradlogic.atherasys.com \
#             -d api.gradlogic.atherasys.com
# =============================================================================

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name gradlogic.atherasys.com admin.gradlogic.atherasys.com campus.gradlogic.atherasys.com exam.gradlogic.atherasys.com api.gradlogic.atherasys.com;
    return 301 https://$host$request_uri;
}

# ── Frontend portals (served by Vercel — just redirect) ──────────────────────
# NOTE: If using Vercel for frontend, remove this block and point DNS to Vercel.
# If self-hosting frontend on this VPS, keep this block.
server {
    listen 443 ssl;
    server_name gradlogic.atherasys.com admin.gradlogic.atherasys.com campus.gradlogic.atherasys.com exam.gradlogic.atherasys.com;

    ssl_certificate     /etc/letsencrypt/live/gradlogic.atherasys.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gradlogic.atherasys.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # Socket.IO lives on the API — never proxy WS to the SPA container (:3000)
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade              $http_upgrade;
        proxy_set_header   Connection           "upgrade";
        proxy_set_header   Host                 $host;
        proxy_set_header   X-Real-IP            $remote_addr;
        proxy_set_header   X-Forwarded-For      $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto    https;
        proxy_set_header   Origin               $http_origin;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

# ── API subdomain ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.gradlogic.atherasys.com;

    ssl_certificate     /etc/letsencrypt/live/gradlogic.atherasys.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gradlogic.atherasys.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 30m: the question-bank uploader accepts files up to 25m (multer); this sits
    # above it so oversized files get a JSON error from the API, not nginx's 413.
    client_max_body_size 30m;

    location / {
        proxy_pass         http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }

    location /socket.io/ {
        proxy_pass         http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade              $http_upgrade;
        proxy_set_header   Connection           "upgrade";
        proxy_set_header   Host                 $host;
        proxy_set_header   X-Real-IP            $remote_addr;
        proxy_set_header   X-Forwarded-For      $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto    https;
        proxy_set_header   Origin               $http_origin;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
