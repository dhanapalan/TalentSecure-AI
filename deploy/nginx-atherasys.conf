# =============================================================================
# Host-level Nginx config for atherasys.com
# Place at: /etc/nginx/sites-available/atherasys.com
# Enable:   sudo ln -s /etc/nginx/sites-available/atherasys.com /etc/nginx/sites-enabled/
# SSL:      sudo certbot --nginx -d atherasys.com -d www.atherasys.com \
#                -d admin.atherasys.com -d campus.atherasys.com -d exam.atherasys.com \
#                -d api.atherasys.com
# =============================================================================

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name atherasys.com www.atherasys.com admin.atherasys.com campus.atherasys.com exam.atherasys.com api.atherasys.com;
    return 301 https://$host$request_uri;
}

# ── Main site + Admin portal + Campus portal + Exam portal ───────────────────
server {
    listen 443 ssl;
    server_name atherasys.com www.atherasys.com admin.atherasys.com campus.atherasys.com exam.atherasys.com;

    # SSL — filled in automatically by Certbot
    ssl_certificate     /etc/letsencrypt/live/atherasys.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/atherasys.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── All requests → Docker client container (React SPA) ───────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # ── WebSocket for Socket.IO ───────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }
}

# ── API subdomain ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.atherasys.com;

    ssl_certificate     /etc/letsencrypt/live/atherasys.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/atherasys.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 20m;

    location / {
        proxy_pass         http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }

    # ── WebSocket for Socket.IO on API subdomain ──────────────────────────────
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }
}
