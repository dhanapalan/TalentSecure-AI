<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="50%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8"/>
      <stop offset="100%" style="stop-color:#38BDF8"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Abstract connecting nodes — representing talent connecting -->
  <!-- Large node top-left -->
  <circle cx="176" cy="176" r="56" fill="white" opacity="0.95"/>
  <!-- Large node bottom-right -->
  <circle cx="336" cy="336" r="56" fill="white" opacity="0.95"/>
  <!-- Small accent node top-right -->
  <circle cx="352" cy="160" r="28" fill="url(#accent)" opacity="0.8"/>
  <!-- Small accent node bottom-left -->
  <circle cx="160" cy="352" r="28" fill="url(#accent)" opacity="0.8"/>
  <!-- Connection lines -->
  <line x1="220" y1="198" x2="312" y2="314" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.7"/>
  <line x1="208" y1="164" x2="324" y2="160" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <line x1="172" y1="208" x2="164" y2="324" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <line x1="348" y1="188" x2="340" y2="304" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <line x1="188" y1="348" x2="304" y2="340" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <!-- N letter inside top-left node -->
  <text x="176" y="188" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="900" fill="#4F46E5">N</text>
  <!-- C letter inside bottom-right node -->
  <text x="336" y="348" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="900" fill="#2563EB">C</text>
</svg>
