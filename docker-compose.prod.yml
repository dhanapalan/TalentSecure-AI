services:
  # ── PostgreSQL (on VPS) ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: talentsecure-postgres
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DATABASE}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - talentsecure

  # ── Redis (on VPS) ───────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: talentsecure-redis
    # Enable auth only when REDIS_PASSWORD is set (double-quoted so it expands at
    # runtime; the old single-quoted test always evaluated true and broke startup).
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ];
             then exec redis-server --requirepass "$$REDIS_PASSWORD";
             else exec redis-server; fi'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redisdata:/data
    healthcheck:
      # Authenticate only when a password is configured, else plain ping.
      test: ["CMD-SHELL", "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a \"$$REDIS_PASSWORD\" --no-auth-warning ping; else redis-cli ping; fi | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - talentsecure

  # ── MinIO (S3-compatible file storage) ──────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: talentsecure-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - miniodata:/data
    ports:
      - "127.0.0.1:9000:9000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - talentsecure

  # ── API Server ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    container_name: talentsecure-api
    env_file: .env
    environment:
      NODE_ENV: production
      DISABLE_RATE_LIMIT: "false"
    ports:
      - "127.0.0.1:5050:5050"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # MinIO is only used for file storage — don't block API boot on its health.
      # Login/dashboard/roles work without it; only uploads need MinIO up.
      minio:
        condition: service_started
    restart: unless-stopped
    networks:
      - talentsecure

  # ── Client (React / Vite → nginx) ────────────────────────────────────────────
  client:
    build:
      context: .
      dockerfile: docker/Dockerfile.client
      args:
        VITE_API_URL: ""   # empty = relative /api paths proxied by nginx
    container_name: talentsecure-client
    ports:
      - "127.0.0.1:3000:80"
    volumes:
      - ./docker/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - talentsecure

  # ── AI / CV Engine ──────────────────────────────────────────────────────────
  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: ../docker/Dockerfile.ai-engine
    container_name: talentsecure-ai
    environment:
      BACKEND_URL: http://api:5050
      AI_ENGINE_API_KEY: ${AI_ENGINE_API_KEY}
    restart: unless-stopped
    networks:
      - talentsecure

  # ── Judge0 CE (Code Execution Sandbox) ─────────────────────────────────────
  # Opt-in — only starts when you pass --profile judge0:
  #   docker compose --profile judge0 up
  # In production, judge0 keeps its own isolated postgres + redis for sandbox safety.
  judge0:
    image: judge0/judge0:1.13.0
    container_name: talentsecure-judge0
    profiles: [judge0]
    environment:
      REDIS_URL: redis://judge0-redis:6379
      POSTGRES_HOST: judge0-postgres
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: ${JUDGE0_PG_PASSWORD}
      POSTGRES_DB: judge0_db
    depends_on:
      judge0-postgres:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy
    restart: unless-stopped
    privileged: true
    networks:
      - judge0

  judge0-postgres:
    image: postgres:16-alpine
    container_name: talentsecure-judge0-postgres
    profiles: [judge0]
    environment:
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: ${JUDGE0_PG_PASSWORD}
      POSTGRES_DB: judge0_db
    volumes:
      - judge0pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge0"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - judge0

  judge0-redis:
    image: redis:7-alpine
    container_name: talentsecure-judge0-redis
    profiles: [judge0]
    volumes:
      - judge0redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - judge0

networks:
  talentsecure:
    driver: bridge
  judge0:
    driver: bridge

volumes:
  pgdata:
    external: true
    name: talentsecure-ai_pgdata

  redisdata:
    external: true
    name: talentsecure-ai_redisdata

  miniodata:
    external: true
    name: talentsecure-ai_miniodata

  judge0pgdata:
    external: true
    name: talentsecure-ai_judge0pgdata

  judge0redisdata:
    external: true
    name: talentsecure-ai_judge0redisdata
