services:
  # ── PostgreSQL (on VPS) ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: talentsecure-postgres
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DATABASE}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis (on VPS) ───────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: talentsecure-redis
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MinIO (S3-compatible file storage) ──────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: talentsecure-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - miniodata:/data
    ports:
      - "127.0.0.1:9000:9000"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── API Server ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    container_name: talentsecure-api
    env_file: .env
    environment:
      NODE_ENV: production
      DISABLE_RATE_LIMIT: "false"
    ports:
      - "127.0.0.1:5050:5050"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # ── AI / CV Engine ──────────────────────────────────────────────────────────
  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: ../docker/Dockerfile.ai-engine
    container_name: talentsecure-ai
    environment:
      BACKEND_URL: http://api:5050
      AI_ENGINE_API_KEY: ${AI_ENGINE_API_KEY}
    restart: unless-stopped

  # ── Judge0 CE (Code Execution Sandbox) ─────────────────────────────────────
  judge0:
    image: judge0/judge0:1.13.0
    container_name: talentsecure-judge0
    environment:
      REDIS_URL: redis://judge0-redis:6379
      POSTGRES_HOST: judge0-postgres
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: ${JUDGE0_PG_PASSWORD}
      POSTGRES_DB: judge0_db
    depends_on:
      judge0-postgres:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy
    restart: unless-stopped
    privileged: true

  judge0-postgres:
    image: postgres:16-alpine
    container_name: talentsecure-judge0-postgres
    environment:
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: ${JUDGE0_PG_PASSWORD}
      POSTGRES_DB: judge0_db
    volumes:
      - judge0pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge0"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  judge0-redis:
    image: redis:7-alpine
    container_name: talentsecure-judge0-redis
    volumes:
      - judge0redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
  judge0pgdata:
  judge0redisdata:
