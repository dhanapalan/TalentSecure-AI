server {
    listen 80;
    # Serve SPA for all frontend subdomains
    server_name atherasys.com www.atherasys.com admin.atherasys.com campus.atherasys.com exam.atherasys.com;
    root /usr/share/nginx/html;
    index index.html;

    # ── SPA: all non-file routes → index.html ──────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy API calls to the Node.js backend ─────────────────────────────────
    location /api/ {
        proxy_pass         http://api:5050;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── WebSocket proxy for Socket.IO ──────────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://api:5050;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }

    # ── Static asset caching ───────────────────────────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Gzip ───────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
}
