version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: talentsecure
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: talentsecure_db
    volumes:
      - postgres_staging:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talentsecure -d talentsecure_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5050:5050"
    environment:
      NODE_ENV: staging
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: talentsecure
      PG_PASSWORD: secret
      PG_DATABASE: talentsecure_db
      JWT_SECRET: staging_jwt_secret_key_change_in_production
      PORT: 5050
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/api/auth/login", "-X", "POST"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:5050
      VITE_ENV: staging
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_staging:
