services:
  # ── PostgreSQL 16 ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: talentsecure-postgres
    environment:
      POSTGRES_USER: talentsecure
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: talentsecure_db
    ports:
      - "${TS_POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db:/docker-entrypoint-initdb.d  # Auto-run schema on first start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talentsecure -d talentsecure_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: talentsecure-redis
    ports:
      - "${TS_REDIS_PORT:-6380}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible storage) ──────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: talentsecure-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    volumes:
      - miniodata:/data

  # ── API Server (Node.js / Express) ─────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    container_name: talentsecure-api
    env_file: .env
    environment:
      PG_HOST: postgres
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      CLIENT_URL: http://localhost:3000
      DISABLE_RATE_LIMIT: ${DISABLE_RATE_LIMIT:-true}
    ports:
      - "5050:5050"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  # ── AI / CV Engine (Python / FastAPI) ──────────────────────────────────────
  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: ../docker/Dockerfile.ai-engine
    container_name: talentsecure-ai
    environment:
      BACKEND_URL: http://api:5050
      AI_ENGINE_API_KEY: dev-ai-engine-key
    ports:
      - "8000:8000"
    depends_on:
      - api
    restart: unless-stopped

  # ── Client (React / Vite → nginx) ─────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: ../docker/Dockerfile.client
    container_name: talentsecure-client
    ports:
      - "3000:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped

  # ── Judge0 CE (Code Execution Sandbox) ─────────────────────────────────────
  judge0:
    image: judge0/judge0-ce:1.13.0
    container_name: talentsecure-judge0
    ports:
      - "2358:2358"
    environment:
      REDIS_URL: redis://judge0-redis:6379
      POSTGRES_HOST: judge0-postgres
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0secret
      POSTGRES_DB: judge0_db
    depends_on:
      judge0-postgres:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy
    restart: unless-stopped
    privileged: true

  judge0-postgres:
    image: postgres:16-alpine
    container_name: talentsecure-judge0-postgres
    environment:
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0secret
      POSTGRES_DB: judge0_db
    volumes:
      - judge0pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge0"]
      interval: 10s
      timeout: 5s
      retries: 5

  judge0-redis:
    image: redis:7-alpine
    container_name: talentsecure-judge0-redis
    volumes:
      - judge0redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
  miniodata:
  judge0pgdata:
  judge0redisdata:
